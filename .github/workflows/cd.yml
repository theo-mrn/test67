name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:


  push:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/test67
          tags: |
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}


      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}





  deploy:
    needs: push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}

          password: ${{ secrets.SSH_PASSWORD }}

          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/test67:latest
            docker stop test67 || true
            docker rm test67 || true
            docker run -d --name test67 --restart unless-stopped -p 3000:3000 ${{ secrets.DOCKER_USERNAME }}/test67:latest
            echo "✓ Deployed: http://${{ secrets.SSH_HOST }}:3000"

